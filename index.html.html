<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>D&D Charakterfindung</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f8f7f4; --surface: #fff; --surface2: #f1efe9;
    --border: rgba(0,0,0,0.1); --border2: rgba(0,0,0,0.2);
    --text: #1a1a1a; --text2: #5a5a5a; --text3: #999;
    --blue-bg: #eaf2fc; --blue-border: #4a90d9; --blue-text: #1a5a9a;
    --green: #1a6a3a; --red: #8b1a1a; --radius: 12px; --radius-sm: 8px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg:#1a1a1a; --surface:#242424; --surface2:#2e2e2e;
      --border:rgba(255,255,255,0.1); --border2:rgba(255,255,255,0.2);
      --text:#f0f0f0; --text2:#aaa; --text3:#666;
      --blue-bg:#1a2d40; --blue-border:#4a90d9; --blue-text:#7ab8f0;
      --green:#6abf8a; --red:#f07a7a;
    }
  }
  body { background:var(--bg); font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; color:var(--text); min-height:100vh; padding:24px 16px 48px; }
  #app { max-width:640px; margin:0 auto; }
  .header { text-align:center; margin-bottom:28px; }
  .badge { display:inline-block; font-size:11px; font-weight:600; letter-spacing:1.5px; text-transform:uppercase; color:var(--text3); margin-bottom:10px; }
  .header h1 { font-size:24px; font-weight:600; margin-bottom:6px; }
  .header p { font-size:14px; color:var(--text2); line-height:1.5; }
  .prog-wrap { background:var(--surface2); border-radius:99px; height:4px; margin:0 0 24px; overflow:hidden; }
  .prog-fill { height:100%; background:#4a90d9; border-radius:99px; transition:width .35s ease; }
  .card { background:var(--surface); border:.5px solid var(--border); border-radius:var(--radius); padding:20px; margin-bottom:16px; }
  .q-meta { font-size:11px; font-weight:600; letter-spacing:1px; text-transform:uppercase; color:var(--text3); margin-bottom:8px; }
  .q-text { font-size:17px; font-weight:500; line-height:1.45; margin-bottom:18px; }
  .opts { display:flex; flex-direction:column; gap:8px; }
  .opt { background:var(--surface2); border:.5px solid var(--border); border-radius:var(--radius-sm); padding:12px 14px; text-align:left; cursor:pointer; font-size:14px; color:var(--text); line-height:1.45; display:flex; gap:10px; align-items:flex-start; transition:border-color .15s,background .15s; width:100%; font-family:inherit; }
  .opt:hover { border-color:var(--border2); background:var(--surface); }
  .opt.sel { border-color:var(--blue-border); background:var(--blue-bg); }
  .opt-l { font-size:11px; font-weight:600; color:var(--text3); min-width:16px; padding-top:1px; flex-shrink:0; }
  .opt.sel .opt-l { color:var(--blue-text); }
  .nav { display:flex; justify-content:space-between; align-items:center; }
  .btn { border-radius:var(--radius-sm); padding:10px 20px; font-size:14px; font-weight:500; cursor:pointer; font-family:inherit; transition:opacity .15s,background .15s; }
  .btn-g { background:transparent; border:.5px solid var(--border2); color:var(--text2); }
  .btn-g:hover { background:var(--surface2); }
  .btn-g:disabled { opacity:.3; cursor:default; }
  .btn-s { background:var(--text); color:var(--bg); border:none; }
  .btn-s:hover { opacity:.85; }
  .btn-s:disabled { opacity:.3; cursor:default; }
  .q-cnt { font-size:13px; color:var(--text3); }
  .sl { font-size:11px; font-weight:600; letter-spacing:1px; text-transform:uppercase; color:var(--text3); margin-bottom:8px; }
  .divider { border:none; border-top:.5px solid var(--border); margin:16px 0; }
  .result-hero { text-align:center; padding:8px 0 20px; }
  .r-icon { font-size:52px; margin-bottom:10px; line-height:1; }
  .r-name { font-size:26px; font-weight:600; margin-bottom:4px; }
  .r-sub { font-size:14px; color:var(--text2); }
  .r-desc { font-size:14px; color:var(--text2); line-height:1.65; }
  .role-grid { display:grid; grid-template-columns:repeat(5,1fr); gap:6px; }
  @media(max-width:480px){ .role-grid{grid-template-columns:repeat(3,1fr);} }
  .role-box { background:var(--surface2); border-radius:var(--radius-sm); padding:8px; text-align:center; }
  .role-ic { font-size:18px; margin-bottom:3px; }
  .role-nm { font-size:11px; font-weight:600; margin-bottom:2px; }
  .role-vl { font-size:11px; color:var(--text3); margin-top:3px; }
  .role-bw { height:4px; background:var(--border); border-radius:99px; margin-top:4px; overflow:hidden; }
  .role-bf { height:100%; border-radius:99px; }
  .cx-row { display:flex; gap:4px; }
  .cx-pip { width:22px; height:6px; border-radius:99px; background:var(--border); }
  .cx-pip.on { background:#4a90d9; }
  .sw-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  @media(max-width:420px){ .sw-grid{grid-template-columns:1fr;} }
  .sw-box { background:var(--surface2); border-radius:var(--radius-sm); padding:12px; }
  .sw-lbl { font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:1px; margin-bottom:5px; }
  .sw-box.str .sw-lbl { color:var(--green); }
  .sw-box.wk .sw-lbl { color:var(--red); }
  .sw-box p { font-size:13px; color:var(--text2); line-height:1.5; }
  .ps-box { background:var(--surface2); border-radius:var(--radius-sm); padding:12px 14px; }
  .ps-item { display:flex; align-items:flex-start; gap:8px; margin-bottom:6px; font-size:13px; color:var(--text2); line-height:1.5; }
  .ps-item:last-child { margin-bottom:0; }
  .ps-dot { width:6px; height:6px; border-radius:50%; background:#4a90d9; margin-top:5px; flex-shrink:0; }
  .sub-item { background:var(--surface2); border-radius:var(--radius-sm); padding:12px 14px; margin-bottom:8px; border:.5px solid var(--border); }
  .sub-item.top { border-color:var(--blue-border); background:var(--blue-bg); }
  .sub-head { display:flex; align-items:center; gap:8px; margin-bottom:4px; flex-wrap:wrap; }
  .sub-name { font-size:14px; font-weight:500; color:var(--text); }
  .sub-src { font-size:11px; color:var(--text3); }
  .sub-badge { font-size:10px; font-weight:600; padding:2px 8px; border-radius:99px; background:var(--blue-border); color:#fff; }
  .sub-role { font-size:11px; color:var(--text3); margin-left:auto; }
  .sub-bar-wrap { height:3px; background:var(--border); border-radius:99px; margin:6px 0; overflow:hidden; }
  .sub-bar { height:100%; border-radius:99px; background:#4a90d9; }
  .sub-desc { font-size:13px; color:var(--text2); line-height:1.5; }
  .info-box { background:var(--surface2); border-radius:var(--radius-sm); padding:12px 14px; margin-bottom:8px; }
  .info-title { font-size:14px; font-weight:500; margin-bottom:3px; }
  .info-reason { font-size:13px; color:var(--text2); line-height:1.5; }
  .tag-row { display:flex; flex-wrap:wrap; gap:6px; }
  .tag { font-size:12px; padding:3px 10px; border-radius:99px; border:.5px solid var(--border2); color:var(--text2); background:var(--surface2); }
  .sc-row { display:flex; align-items:center; gap:10px; margin-bottom:8px; }
  .sc-lbl { font-size:13px; color:var(--text2); min-width:105px; }
  .sc-track { flex:1; height:6px; background:var(--surface2); border-radius:99px; overflow:hidden; }
  .sc-bar { height:100%; border-radius:99px; transition:width .7s ease; }
  .sc-val { font-size:12px; color:var(--text3); min-width:20px; text-align:right; }
  .alt-box { background:var(--surface2); border-radius:var(--radius-sm); padding:12px 14px; }
  .alt-item { font-size:13px; color:var(--text2); margin-bottom:5px; line-height:1.5; }
  .alt-item:last-child { margin-bottom:0; }
  .restart-btn { width:100%; padding:12px; background:transparent; border:.5px solid var(--border2); border-radius:var(--radius-sm); font-size:14px; color:var(--text2); cursor:pointer; font-family:inherit; transition:background .15s; margin-top:8px; }
  .restart-btn:hover { background:var(--surface2); }
  .footer-note { text-align:center; font-size:12px; color:var(--text3); margin-top:24px; }
  .sub-detail-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.55); z-index:100; display:flex; align-items:flex-end; justify-content:center; }
  @media(min-width:600px){ .sub-detail-overlay{align-items:center;padding:20px;} }
  .sub-detail-panel { background:var(--surface); border-radius:var(--radius) var(--radius) 0 0; width:100%; max-width:600px; max-height:88vh; overflow-y:auto; padding:24px 20px 32px; }
  @media(min-width:600px){ .sub-detail-panel{border-radius:var(--radius);} }
  .sub-detail-hd { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:4px; }
  .sub-detail-title { font-size:20px; font-weight:600; color:var(--text); }
  .sub-close { background:var(--surface2); border:.5px solid var(--border2); border-radius:var(--radius-sm); width:32px; height:32px; cursor:pointer; font-size:18px; display:flex; align-items:center; justify-content:center; flex-shrink:0; color:var(--text2); font-family:inherit; line-height:1; }
  .sub-close:hover { background:var(--surface); }
  .spell-tag { display:inline-block; font-size:12px; padding:3px 10px; border-radius:99px; background:var(--blue-bg); border:.5px solid var(--blue-border); color:var(--blue-text); margin:0 4px 6px 0; }
  .sub-clickable { cursor:pointer; }
  .sub-clickable:hover { border-color:var(--border2) !important; background:var(--surface) !important; }
  .sub-hint { font-size:11px; color:var(--text3); text-align:center; margin-bottom:12px; }
</style>
</head>
<body>
<div id="app"></div>
<script>
const questions = [
  // KAMPFROLLE (1-3)
  { id:1, cat:"Kampfrolle", text:"Was ist dein liebster Moment in einem Kampf?", opts:[
    {l:"A", text:"Ich stehe vorne, halte Schläge ab und schütze meine Verbündeten", tags:["fighter","paladin","barbarian"], stags:["fighter_cavalier","fighter_champion","paladin_devotion","barbarian_totem"]},
    {l:"B", text:"Ich mache in einem einzigen Treffer massiven Schaden und verschwinde wieder", tags:["rogue","ranger"], stags:["rogue_assassin","rogue_thief","ranger_gloom"]},
    {l:"C", text:"Ich kontrolliere das Schlachtfeld — Gegner können nicht machen was sie wollen", tags:["wizard","sorcerer","druid"], stags:["wizard_divination","wizard_evocation","sorcerer_draconic","druid_land"]},
    {l:"D", text:"Ich halte meine Verbündeten am Leben und verstärke sie", tags:["cleric","bard","druid","paladin"], stags:["cleric_life","cleric_grave","bard_lore","druid_dreams","paladin_glory"]},
    {l:"E", text:"Ich schieße aus der Distanz und deal konstanten zuverlässigen Schaden", tags:["ranger","warlock","fighter"], stags:["ranger_hunter","warlock_fiend","warlock_goo","fighter_champion"]}
  ]},
  { id:2, cat:"Kampfrolle", text:"Wie gehst du mit mehreren Gegnern gleichzeitig um?", opts:[
    {l:"A", text:"Ich stelle mich dazwischen und nehme den Schaden für die Gruppe", tags:["fighter","barbarian","paladin"], stags:["fighter_cavalier","barbarian_totem","paladin_devotion","paladin_ancients"]},
    {l:"B", text:"Ich zaubere etwas das alle gleichzeitig trifft oder einschränkt", tags:["wizard","sorcerer","druid","cleric"], stags:["wizard_evocation","sorcerer_draconic","sorcerer_storm","druid_land","cleric_light"]},
    {l:"C", text:"Ich fokussiere den gefährlichsten zuerst und eliminiere ihn schnell", tags:["rogue","ranger","warlock"], stags:["rogue_assassin","ranger_gloom","ranger_monster","warlock_fiend","warlock_hexblade"]},
    {l:"D", text:"Ich buff meine Verbündeten damit sie effizienter kämpfen", tags:["bard","cleric","paladin"], stags:["bard_lore","bard_glamour","cleric_war","paladin_glory"]},
    {l:"E", text:"Ich nutze Umgebung und Reichweite um alle auf Abstand zu halten", tags:["ranger","fighter","monk"], stags:["ranger_hunter","fighter_battlemaster","monk_openhand","monk_kensei"]}
  ]},
  { id:3, cat:"Kampfrolle", text:"Was soll dein Charakter nach einem langen Kampftag noch leisten?", opts:[
    {l:"A", text:"Genauso kämpfen wie am Anfang — ich brauche keine Ressourcen", tags:["fighter","barbarian","monk"], stags:["fighter_champion","fighter_battlemaster","barbarian_berserker","monk_openhand"]},
    {l:"B", text:"Noch ein paar impactvolle Tricks in der Hinterhand haben", tags:["paladin","ranger","warlock"], stags:["paladin_vengeance","ranger_gloom","warlock_fiend","warlock_goo"]},
    {l:"C", text:"Ich bin nach 2-3 Kämpfen leer — dafür bin ich in diesen Kämpfen unschlagbar", tags:["wizard","sorcerer","druid"], stags:["wizard_divination","sorcerer_draconic","sorcerer_shadow","druid_moon"]},
    {l:"D", text:"Ich regeneriere bei kurzen Pausen schnell und bin sofort wieder bereit", tags:["warlock","monk","fighter"], stags:["warlock_fiend","warlock_goo","warlock_hexblade","warlock_celestial","monk_shadow","fighter_eldritchknight"]}
  ]},
  // SPIELSTIL (4-5)
  { id:4, cat:"Spielstil", text:"Wie willst du Probleme außerhalb des Kampfes lösen?", opts:[
    {l:"A", text:"Mit Gewalt oder Einschüchterung — direkt und ohne Umweg", tags:["barbarian","fighter","paladin"], stags:["barbarian_zealot","barbarian_totem","fighter_champion","paladin_vengeance"]},
    {l:"B", text:"Mit Cleverness, Fallen und vorbereitetem Plan", tags:["rogue","wizard","ranger","artificer"], stags:["rogue_arcane","rogue_inquisitive","wizard_divination","ranger_hunter","artificer_battlesmith"]},
    {l:"C", text:"Mit Charme, Überredung und sozialer Manipulation", tags:["bard","warlock","sorcerer"], stags:["bard_lore","bard_whispers","warlock_archfey","warlock_goo","sorcerer_divine"]},
    {l:"D", text:"Mit Magie und übernatürlichen Fähigkeiten", tags:["wizard","sorcerer","warlock","cleric"], stags:["wizard_evocation","wizard_conjuration","sorcerer_wild","warlock_fiend","cleric_knowledge"]},
    {l:"E", text:"Mit Naturverbundenheit, Tieren oder uraltem Wissen", tags:["druid","ranger"], stags:["druid_land","druid_shepherd","ranger_beast","ranger_horizon"]}
  ]},
  { id:5, cat:"Spielstil", text:"Wie wichtig ist dir Mobilität im Kampf?", opts:[
    {l:"A", text:"Sehr wichtig — ich will mich frei bewegen, ausweichen, überall sein", tags:["monk","rogue","ranger"], stags:["monk_shadow","monk_drunken","rogue_thief","rogue_scout","ranger_gloom"]},
    {l:"B", text:"Mittel — ich bewege mich wenn nötig aber stehe lieber solide fest", tags:["fighter","paladin","cleric"], stags:["fighter_battlemaster","fighter_cavalier","paladin_devotion","cleric_war"]},
    {l:"C", text:"Unwichtig — ich stehe hinten und zaubere von dort", tags:["wizard","sorcerer","warlock"], stags:["wizard_evocation","sorcerer_draconic","warlock_goo","warlock_fiend"]},
    {l:"D", text:"Ich will der Fels sein den niemand umwirft", tags:["barbarian","fighter"], stags:["barbarian_totem","barbarian_ancestral","fighter_cavalier","fighter_champion"]}
  ]},
  // PERSÖNLICHKEIT (6-8)
  { id:6, cat:"Persönlichkeit", text:"Woher kommt die Kraft deines Charakters?", opts:[
    {l:"A", text:"Jahrelange Ausbildung und Disziplin — ich habe alles erarbeitet", tags:["fighter","monk","ranger","rogue"], stags:["fighter_battlemaster","fighter_samurai","monk_openhand","monk_kensei","ranger_hunter","rogue_thief"]},
    {l:"B", text:"Göttlicher Auftrag oder tiefer Glaube — ich bin berufen", tags:["cleric","paladin"], stags:["cleric_life","cleric_light","cleric_war","paladin_devotion","paladin_glory"]},
    {l:"C", text:"Ein dunkler Pakt mit einer kosmischen oder teuflischen Macht", tags:["warlock"], stags:["warlock_fiend","warlock_goo","warlock_archfey","warlock_hexblade","warlock_celestial"]},
    {l:"D", text:"Angeborenes Talent oder magisches Blut", tags:["sorcerer","bard"], stags:["sorcerer_draconic","sorcerer_wild","sorcerer_divine","bard_lore","bard_swords"]},
    {l:"E", text:"Wissen, Forschung und Studium — Magie ist eine Wissenschaft", tags:["wizard","artificer"], stags:["wizard_divination","wizard_evocation","wizard_conjuration","wizard_abjuration","artificer_artillerist","artificer_battlesmith"]},
    {l:"F", text:"Die Natur selbst hat mir ihre Kraft verliehen", tags:["druid","ranger"], stags:["druid_land","druid_moon","druid_shepherd","ranger_beast","ranger_horizon"]}
  ]},
  { id:7, cat:"Persönlichkeit", text:"Was motiviert deinen Charakter am stärksten?", opts:[
    {l:"A", text:"Ehre, Pflicht und einen Eid einhalten", tags:["paladin","cleric","fighter"], stags:["paladin_devotion","paladin_ancients","cleric_life","cleric_war","fighter_samurai"]},
    {l:"B", text:"Persönliche Macht — stärker werden um jeden Preis", tags:["warlock","barbarian","sorcerer"], stags:["warlock_fiend","warlock_goo","warlock_hexblade","barbarian_berserker","sorcerer_shadow"]},
    {l:"C", text:"Andere schützen — die Gruppe geht immer vor mir", tags:["cleric","druid","paladin","bard"], stags:["cleric_life","cleric_grave","druid_dreams","paladin_devotion","paladin_glory","bard_lore","bard_glamour"]},
    {l:"D", text:"Wahrheit und Wissen — Geheimnisse und Mysterien aufdecken", tags:["wizard","ranger","druid"], stags:["wizard_divination","wizard_conjuration","ranger_horizon","druid_land","warlock_goo"]},
    {l:"E", text:"Freiheit, Abenteuer und persönliche Bereicherung", tags:["rogue","bard","ranger"], stags:["rogue_thief","rogue_swashbuckler","bard_lore","bard_swords","ranger_hunter"]},
    {l:"F", text:"Balance und natürliche Ordnung bewahren", tags:["druid","monk","paladin"], stags:["druid_land","druid_shepherd","monk_openhand","paladin_ancients","ranger_monster"]}
  ]},
  { id:8, cat:"Persönlichkeit", text:"Wie verhält sich dein Charakter wenn die Gruppe in Lebensgefahr ist?", opts:[
    {l:"A", text:"Ich stelle mich vor die anderen — mein Leben zuerst", tags:["paladin","fighter","barbarian"], stags:["paladin_devotion","paladin_ancients","fighter_cavalier","barbarian_totem","barbarian_ancestral"]},
    {l:"B", text:"Ich eliminiere die Bedrohung so schnell wie möglich", tags:["rogue","ranger","warlock","sorcerer"], stags:["rogue_assassin","ranger_gloom","warlock_fiend","sorcerer_draconic","sorcerer_shadow"]},
    {l:"C", text:"Ich heile und stärke die anderen damit wir gemeinsam überleben", tags:["cleric","bard","druid"], stags:["cleric_life","cleric_grave","bard_lore","bard_glamour","druid_dreams","warlock_celestial"]},
    {l:"D", text:"Ich analysiere die Situation und finde den klügsten Ausweg", tags:["wizard","rogue","artificer"], stags:["wizard_divination","rogue_inquisitive","rogue_arcane","artificer_battlesmith","artificer_armorer"]}
  ]},
  // ATMOSPHÄRE (9-10)
  { id:9, cat:"Atmosphäre", text:"Welche dieser Beschreibungen klingt am coolsten?", opts:[
    {l:"A", text:"Ein gepanzerter Krieger der einen Drachen niederringt während Verbündete hinter ihm sicher sind", tags:["fighter","paladin","barbarian"], stags:["fighter_champion","fighter_cavalier","paladin_devotion","barbarian_totem"]},
    {l:"B", text:"Ein Assassine der lautlos aus dem Dunkel tritt, einen tödlichen Schlag setzt und verschwindet", tags:["rogue","monk"], stags:["rogue_assassin","monk_shadow"]},
    {l:"C", text:"Ein Magier der mit einem einzigen Wort eine ganze Armee einfriert", tags:["wizard","sorcerer"], stags:["wizard_evocation","wizard_divination","sorcerer_draconic","sorcerer_storm"]},
    {l:"D", text:"Ein Waldläufer der seinen Feind durch finstere Wälder hetzt ohne je gesehen zu werden", tags:["ranger"], stags:["ranger_gloom","ranger_hunter","ranger_monster"]},
    {l:"E", text:"Ein Kleriker der einen Gefallenen zurückbringt und das Böse mit göttlichem Licht verbrennt", tags:["cleric","paladin"], stags:["cleric_life","cleric_light","paladin_devotion","paladin_vengeance"]},
    {l:"F", text:"Ein Hexenmeister der kosmische Kräfte kanalisiert die kein Sterblicher verstehen sollte", tags:["warlock"], stags:["warlock_goo","warlock_fiend","warlock_archfey","warlock_hexblade"]},
    {l:"G", text:"Ein Barde der mit Worten Armeen bewegt und Feinde mit bloßer Musik bezwingt", tags:["bard"], stags:["bard_lore","bard_glamour","bard_whispers"]}
  ]},
  { id:10, cat:"Atmosphäre", text:"Welche Atmosphäre magst du beim Roleplaying?", opts:[
    {l:"A", text:"Heroisch — epische Momente, klare Helden, große Gesten", tags:["paladin","fighter","cleric"], stags:["paladin_devotion","paladin_glory","fighter_samurai","cleric_light","cleric_war"]},
    {l:"B", text:"Düster und moralisch komplex — keine einfachen Antworten", tags:["warlock","rogue","ranger"], stags:["warlock_goo","warlock_fiend","rogue_assassin","rogue_scout","ranger_gloom","sorcerer_shadow"]},
    {l:"C", text:"Geheimnisvoll — Rätsel, verborgenes Wissen, uralte kosmische Mächte", tags:["wizard","druid","warlock"], stags:["wizard_divination","druid_land","warlock_goo","warlock_archfey","sorcerer_shadow"]},
    {l:"D", text:"Sozial und charaktergetrieben — Beziehungen, Humor, Emotionen", tags:["bard","sorcerer","rogue"], stags:["bard_lore","bard_glamour","sorcerer_divine","rogue_swashbuckler","warlock_archfey"]},

  artificer:{name:"Erfinder",icon:"⚙️",sub:"Artificer",role:"Support / Nützlichkeit / Alleskönner",roleBreakdown:{tank:35,damage:50,control:40,support:75,utility:95},complexity:5,raceRec:"Gnome (Fels)",raceReason:"+2 Intelligenz, Gnomische Schlauheit für Vorteil auf Rettungswürfe gegen Magie — sehr robust",races:["Mensch","Zwerg (Berg)"],desc:"Vielseitigster Charakter — füllt jede Lücke durch Einprägungen. Schwach bei Stufe 1-2, kommt ab Stufe 3 richtig online.",str:"Gibt magische Gegenstände an Verbündete, extrem vielseitig, passt sich jeder Gruppe an",wk:"Sehr schwach bei Stufe 1-2, komplex durch Einprägungsverwaltung",playstyle:["Einprägungen täglich anpassen — gib magische Gegenstände an Verbündete","Zaubervorbereitung täglich überdenken — sehr flexibel","Kommt erst Stufe 3 online — bis dahin durchhalten"],

    {key:"artificer_alchemist",name:"Alchemist",src:"Tasha's",desc:"Tränke und alchemische Effekte. Thematisch interessant aber mechanisch schwächste Option.",role:"Support",spells:["Heilung","Massenheilung","Saures Spritzen","Ranken der Vergeltung"],playstyle:["Experimenteller Elixier: erstelle täglich kostenlose Tränke mit zufälligem Effekt","Alkahest: säure-Angriff der Resistenzen ignoriert — für bestimmte Monster stark","Thematisch sehr interessant aber mechanisch nicht die stärkste Wahl"]}
};

const classColors={fighter:"#378ADD",barbarian:"#D85A30",paladin:"#9B59B6",rogue:"#1D9E75",ranger:"#639922",wizard:"#533AB7",sorcerer:"#BA7517",warlock:"#993556",cleric:"#c8a020",druid:"#2d8a2d",bard:"#D4537E",monk:"#1a8a8a",artificer:"#8a5a1a"};
const roleLabels=[{key:"tank",label:"Tank",icon:"🛡️",color:"#4a90d9"},{key:"damage",label:"Schaden",icon:"⚔️",color:"#d85a30"},{key:"control",label:"Kontrolle",icon:"🔮",color:"#9b59b6"},{key:"support",label:"Support",icon:"💚",color:"#2d8a2d"},{key:"utility",label:"Utility",icon:"🔧",color:"#c8a020"}];

let answers={}, currentQ=0;

function scoreAll(){
  const cls={}, sub={};
  Object.keys(classData).forEach(k=>cls[k]=0);
  Object.values(answers).forEach(({tags,stags})=>{
    tags.forEach(t=>{if(cls[t]!==undefined)cls[t]++;});
    stags.forEach(s=>{sub[s]=(sub[s]||0)+1;});
  });
  return {cls,sub};
}

function pips(n){return Array.from({length:5},(_,i)=>`<div class="cx-pip${i<n?" on":""}"></div>`).join('');}

function render(){
  document.getElementById('app').innerHTML=currentQ<questions.length?buildQ():buildResult();
  bindEvents();
}

function buildQ(){
  const q=questions[currentQ];
  const pct=Math.round((currentQ/questions.length)*100);
  const prev=answers[q.id];
  return `
    <div class="header">
      <span class="badge">D&amp;D 5e</span>
      <h1>Charakterfindung</h1>
      <p>Beantworte 20 Fragen und finde deine perfekte Klasse &amp; Unterklasse</p>
    </div>
    <div class="prog-wrap"><div class="prog-fill" style="width:${pct}%"></div></div>
    <div class="card">
      <div class="q-meta">${q.cat} · Frage ${q.id} von ${questions.length}</div>
      <div class="q-text">${q.text}</div>
      <div class="opts">
        ${q.opts.map(o=>`
          <button class="opt${prev&&JSON.stringify(prev.tags)===JSON.stringify(o.tags)?' sel':''}"
            data-tags='${JSON.stringify(o.tags)}' data-stags='${JSON.stringify(o.stags)}' data-qid="${q.id}">
            <span class="opt-l">${o.l}</span><span>${o.text}</span>
          </button>`).join('')}
      </div>
    </div>
    <div class="nav">
      <button class="btn btn-g" id="bb" ${currentQ===0?'disabled':''}>← Zurück</button>
      <span class="q-cnt">${currentQ+1} / ${questions.length}</span>
      <button class="btn btn-s" id="bn" ${!answers[q.id]?'disabled':''}>${currentQ===questions.length-1?'Ergebnis →':'Weiter →'}</button>
    </div>`;
}

function buildResult(){
  const {cls,sub}=scoreAll();
  const rankedCls=Object.entries(cls).sort((a,b)=>b[1]-a[1]);
  const topKey=rankedCls[0][0];
  const maxCls=rankedCls[0][1];
  const d=classData[topKey];
  const alts=rankedCls.slice(1,3);
  const mySubs=d.subclasses.map(s=>({...s,score:sub[s.key]||0}));
  const maxSubScore=Math.max(...mySubs.map(s=>s.score),1);
  mySubs.sort((a,b)=>b.score-a.score);

  return `
    <div class="header"><span class="badge">Dein Ergebnis</span></div>
    <div class="card">
      <div class="result-hero">
        <div class="r-icon">${d.icon}</div>
        <div class="r-name">${d.name}</div>
        <div class="r-sub">${d.sub} · ${d.role}</div>
      </div>
      <hr class="divider">
      <div style="margin-bottom:16px">
        <div class="sl">Kampfrolle</div>
        <div class="role-grid">
          ${roleLabels.map(r=>`
            <div class="role-box">
              <div class="role-ic">${r.icon}</div>
              <div class="role-nm">${r.label}</div>
              <div class="role-bw"><div class="role-bf" style="width:${d.roleBreakdown[r.key]}%;background:${r.color}"></div></div>
              <div class="role-vl">${d.roleBreakdown[r.key]}%</div>
            </div>`).join('')}
        </div>
      </div>
      <div style="margin-bottom:16px">
        <div class="sl">Komplexität</div>
        <div style="display:flex;align-items:center;gap:10px;">
          <div class="cx-row">${pips(d.complexity)}</div>
          <span style="font-size:13px;color:var(--text2)">${['','Sehr einfach','Einfach','Mittel','Komplex','Sehr komplex'][d.complexity]}</span>
        </div>
      </div>
      <hr class="divider">
      <div style="margin-bottom:16px">
        <div class="sl">Beschreibung</div>
        <div class="r-desc">${d.desc}</div>
      </div>
      <div style="margin-bottom:16px">
        <div class="sl">Spielweise</div>
        <div class="ps-box">
          ${d.playstyle.map(p=>`<div class="ps-item"><div class="ps-dot"></div><span>${p}</span></div>`).join('')}
        </div>
      </div>
      <div class="sw-grid" style="margin-bottom:16px">
        <div class="sw-box str"><div class="sw-lbl">Stärken</div><p>${d.str}</p></div>
        <div class="sw-box wk"><div class="sw-lbl">Schwächen</div><p>${d.wk}</p></div>
      </div>
      <hr class="divider">
      <div style="margin-bottom:16px">
        <div class="sl">Unterklassen — Ranking basierend auf deinen Antworten</div>
        <div class="sub-hint">Tippe auf eine Unterklasse für Details, Zauber und Spielweise</div>
        ${mySubs.map((s,i)=>`
          <div class="sub-item sub-clickable${i===0?' top':''}" data-subkey="${s.key}" style="${i===0?'border-color:var(--blue-border);background:var(--blue-bg);':''}">
            <div class="sub-head">
              <span class="sub-name">${s.name}</span>
              <span class="sub-src">${s.src}</span>
              ${i===0?'<span class="sub-badge">Empfohlen</span>':''}
              <span class="sub-role">${s.role}</span>
            </div>
            <div class="sub-bar-wrap"><div class="sub-bar" style="width:${Math.round((s.score/maxSubScore)*100)}%"></div></div>
            <div class="sub-desc">${s.desc}</div>
          </div>`).join('')}
      </div>
      <div style="margin-bottom:16px">
        <div class="sl">Empfohlene Rasse</div>
        <div class="info-box">
          <div class="info-title">${d.raceRec}</div>
          <div class="info-reason">${d.raceReason}</div>
        </div>
        <div class="tag-row">
          ${d.races.map(r=>`<span class="tag">${r}</span>`).join('')}
        </div>
      </div>
      <hr class="divider">
      <div style="margin-bottom:16px">
        <div class="sl">Dein Klassen-Profil</div>
        ${rankedCls.slice(0,8).map(([k,v])=>`
          <div class="sc-row">
            <span class="sc-lbl">${classData[k].icon} ${classData[k].name}</span>
            <div class="sc-track"><div class="sc-bar" style="width:${maxCls>0?Math.round((v/maxCls)*100):0}%;background:${classColors[k]}"></div></div>
            <span class="sc-val">${v}</span>
          </div>`).join('')}
      </div>
      ${alts.length?`
      <div class="alt-box">
        <div class="sl" style="margin-bottom:8px">Alternativ passend</div>
        ${alts.map(([k])=>`<div class="alt-item">${classData[k].icon} <strong>${classData[k].name}</strong> — ${classData[k].subclasses[0].name} · ${classData[k].role}</div>`).join('')}
      </div>`:''}
    </div>
    <button class="restart-btn" id="restart">↺ Neu starten</button>
    <div class="footer-note">D&amp;D 5e · PHB + Xanathar's Guide</div>`;
}

function openSubDetail(subKey){
  // find subclass across all classes
  let found = null;
  for(const cls of Object.values(classData)){
    const s = cls.subclasses.find(x=>x.key===subKey);
    if(s){ found=s; break; }
  }
  if(!found) return;

  const overlay = document.createElement('div');
  overlay.className = 'sub-detail-overlay';
  overlay.id = 'sub-overlay';
  overlay.innerHTML = `
    <div class="sub-detail-panel">
      <div class="sub-detail-hd">
        <div>
          <div class="sub-detail-title">${found.name}</div>
          <div style="font-size:12px;color:var(--text3);margin-top:2px;">${found.src} · ${found.role}</div>
        </div>
        <button class="sub-close" id="sub-close-btn">✕</button>
      </div>
      <hr class="divider">
      <div style="margin-bottom:14px">
        <div class="sl">Beschreibung</div>
        <div class="r-desc">${found.desc}</div>
      </div>
      ${found.spells && found.spells.length > 0 ? `
      <div style="margin-bottom:14px">
        <div class="sl">Wichtige Zauber &amp; Fähigkeiten</div>
        <div style="margin-top:4px">${found.spells.map(sp=>`<span class="spell-tag">${sp}</span>`).join('')}</div>
      </div>` : ''}
      <div style="margin-bottom:8px">
        <div class="sl">Spielweise</div>
        <div class="ps-box">
          ${(found.playstyle||[]).map(p=>`<div class="ps-item"><div class="ps-dot"></div><span>${p}</span></div>`).join('')}
        </div>
      </div>
    </div>`;

  document.body.appendChild(overlay);

  document.getElementById('sub-close-btn').addEventListener('click', ()=>overlay.remove());
  overlay.addEventListener('click', e=>{ if(e.target===overlay) overlay.remove(); });
}

function bindEvents(){
  document.querySelectorAll('.opt').forEach(btn=>{
    btn.addEventListener('click',()=>{
      const qid=parseInt(btn.dataset.qid);
      answers[qid]={tags:JSON.parse(btn.dataset.tags),stags:JSON.parse(btn.dataset.stags)};
      document.querySelectorAll('.opt').forEach(b=>b.classList.remove('sel'));
      btn.classList.add('sel');
      const n=document.getElementById('bn');
      if(n)n.disabled=false;
    });
  });
  const bb=document.getElementById('bb');
  if(bb)bb.addEventListener('click',()=>{if(currentQ>0){currentQ--;render();}});
  const bn=document.getElementById('bn');
  if(bn)bn.addEventListener('click',()=>{
    if(currentQ<questions.length-1){currentQ++;render();}
    else{currentQ=questions.length;render();}
  });
  const rs=document.getElementById('restart');
  if(rs)rs.addEventListener('click',()=>{answers={};currentQ=0;render();});

  document.querySelectorAll('.sub-clickable').forEach(el=>{
    el.addEventListener('click',()=>openSubDetail(el.dataset.subkey));
  });
}

render();
</script>
