<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>D&D Charakterfindung</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#f8f7f4;--sur:#fff;--sur2:#f1efe9;--bor:rgba(0,0,0,0.1);--bor2:rgba(0,0,0,0.2);--txt:#1a1a1a;--txt2:#5a5a5a;--txt3:#999;--bbg:#eaf2fc;--bbd:#4a90d9;--btx:#1a5a9a;--grn:#1a6a3a;--red:#8b1a1a;--r:12px;--rs:8px}
@media(prefers-color-scheme:dark){:root{--bg:#1a1a1a;--sur:#242424;--sur2:#2e2e2e;--bor:rgba(255,255,255,0.1);--bor2:rgba(255,255,255,0.2);--txt:#f0f0f0;--txt2:#aaa;--txt3:#666;--bbg:#1a2d40;--bbd:#4a90d9;--btx:#7ab8f0;--grn:#6abf8a;--red:#f07a7a}}
body{background:var(--bg);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:var(--txt);min-height:100vh;padding:24px 16px 48px}
#app{max-width:640px;margin:0 auto}
.hdr{text-align:center;margin-bottom:28px}
.bdg{display:inline-block;font-size:11px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--txt3);margin-bottom:10px}
.hdr h1{font-size:24px;font-weight:600;margin-bottom:6px}
.hdr p{font-size:14px;color:var(--txt2);line-height:1.5}
.pw{background:var(--sur2);border-radius:99px;height:4px;margin:0 0 24px;overflow:hidden}
.pf{height:100%;background:#4a90d9;border-radius:99px;transition:width .35s ease}
.card{background:var(--sur);border:.5px solid var(--bor);border-radius:var(--r);padding:20px;margin-bottom:16px}
.qm{font-size:11px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--txt3);margin-bottom:8px}
.qt{font-size:17px;font-weight:500;line-height:1.45;margin-bottom:18px}
.opts{display:flex;flex-direction:column;gap:8px}
.opt{background:var(--sur2);border:.5px solid var(--bor);border-radius:var(--rs);padding:12px 14px;text-align:left;cursor:pointer;font-size:14px;color:var(--txt);line-height:1.45;display:flex;gap:10px;align-items:flex-start;transition:border-color .15s,background .15s;width:100%;font-family:inherit}
.opt:hover{border-color:var(--bor2);background:var(--sur)}
.opt.sel{border-color:var(--bbd);background:var(--bbg)}
.ol{font-size:11px;font-weight:600;color:var(--txt3);min-width:16px;padding-top:1px;flex-shrink:0}
.opt.sel .ol{color:var(--btx)}
.nav{display:flex;justify-content:space-between;align-items:center}
.btn{border-radius:var(--rs);padding:10px 20px;font-size:14px;font-weight:500;cursor:pointer;font-family:inherit;transition:opacity .15s,background .15s}
.bg{background:transparent;border:.5px solid var(--bor2);color:var(--txt2)}
.bg:hover{background:var(--sur2)}
.bg:disabled{opacity:.3;cursor:default}
.bs{background:var(--txt);color:var(--bg);border:none}
.bs:hover{opacity:.85}
.bs:disabled{opacity:.3;cursor:default}
.qc{font-size:13px;color:var(--txt3)}
.sl{font-size:11px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--txt3);margin-bottom:8px}
.div{border:none;border-top:.5px solid var(--bor);margin:16px 0}
.rh{text-align:center;padding:8px 0 20px}
.ri{font-size:52px;margin-bottom:10px;line-height:1}
.rn{font-size:26px;font-weight:600;margin-bottom:4px}
.rs{font-size:14px;color:var(--txt2)}
.rd{font-size:14px;color:var(--txt2);line-height:1.65}
.rg{display:grid;grid-template-columns:repeat(5,1fr);gap:6px}
@media(max-width:480px){.rg{grid-template-columns:repeat(3,1fr)}}
.rb{background:var(--sur2);border-radius:var(--rs);padding:8px;text-align:center}
.ric{font-size:18px;margin-bottom:3px}
.rnm{font-size:11px;font-weight:600;margin-bottom:2px}
.rvl{font-size:11px;color:var(--txt3);margin-top:3px}
.rbw{height:4px;background:var(--bor);border-radius:99px;margin-top:4px;overflow:hidden}
.rbf{height:100%;border-radius:99px}
.cxr{display:flex;gap:4px}
.cxp{width:22px;height:6px;border-radius:99px;background:var(--bor)}
.cxp.on{background:#4a90d9}
.swg{display:grid;grid-template-columns:1fr 1fr;gap:10px}
@media(max-width:420px){.swg{grid-template-columns:1fr}}
.swb{background:var(--sur2);border-radius:var(--rs);padding:12px}
.swl{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:1px;margin-bottom:5px}
.swb.str .swl{color:var(--grn)}
.swb.wk .swl{color:var(--red)}
.swb p{font-size:13px;color:var(--txt2);line-height:1.5}
.psb{background:var(--sur2);border-radius:var(--rs);padding:12px 14px}
.psi{display:flex;align-items:flex-start;gap:8px;margin-bottom:6px;font-size:13px;color:var(--txt2);line-height:1.5}
.psi:last-child{margin-bottom:0}
.psd{width:6px;height:6px;border-radius:50%;background:#4a90d9;margin-top:5px;flex-shrink:0}
.sbi{background:var(--sur2);border-radius:var(--rs);padding:12px 14px;margin-bottom:8px;border:.5px solid var(--bor)}
.sbi.top{border-color:var(--bbd);background:var(--bbg)}
.sbh{display:flex;align-items:center;gap:8px;margin-bottom:4px;flex-wrap:wrap}
.sbn{font-size:14px;font-weight:500;color:var(--txt)}
.sbsrc{font-size:11px;color:var(--txt3)}
.sbbdg{font-size:10px;font-weight:600;padding:2px 8px;border-radius:99px;background:var(--bbd);color:#fff}
.sbrl{font-size:11px;color:var(--txt3);margin-left:auto}
.sbbw{height:3px;background:var(--bor);border-radius:99px;margin:6px 0;overflow:hidden}
.sbbar{height:100%;border-radius:99px;background:#4a90d9}
.sbd{font-size:13px;color:var(--txt2);line-height:1.5}
.ib{background:var(--sur2);border-radius:var(--rs);padding:12px 14px;margin-bottom:8px}
.it{font-size:14px;font-weight:500;margin-bottom:3px}
.ir{font-size:13px;color:var(--txt2);line-height:1.5}
.tgr{display:flex;flex-wrap:wrap;gap:6px}
.tg{font-size:12px;padding:3px 10px;border-radius:99px;border:.5px solid var(--bor2);color:var(--txt2);background:var(--sur2)}
.scr{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.scl{font-size:13px;color:var(--txt2);min-width:105px}
.sct{flex:1;height:6px;background:var(--sur2);border-radius:99px;overflow:hidden}
.scb{height:100%;border-radius:99px;transition:width .7s ease}
.scv{font-size:12px;color:var(--txt3);min-width:20px;text-align:right}
.altb{background:var(--sur2);border-radius:var(--rs);padding:12px 14px}
.alti{font-size:13px;color:var(--txt2);margin-bottom:5px;line-height:1.5}
.alti:last-child{margin-bottom:0}
.rstb{width:100%;padding:12px;background:transparent;border:.5px solid var(--bor2);border-radius:var(--rs);font-size:14px;color:var(--txt2);cursor:pointer;font-family:inherit;transition:background .15s;margin-top:8px}
.rstb:hover{background:var(--sur2)}
.fn{text-align:center;font-size:12px;color:var(--txt3);margin-top:24px}
</style>
</head>
<body>
<div id="app"></div>
<script>
var Q=[
{id:1,cat:"Kampfrolle",text:"Was ist dein liebster Moment in einem Kampf?",opts:[
{l:"A",text:"Ich stehe vorne, halte Schlaege ab und schuetze meine Verbuendeten",tags:["fighter","paladin","barbarian"],stags:["fighter_cavalier","fighter_champion","paladin_devotion","barbarian_totem"]},
{l:"B",text:"Ich mache in einem einzigen Treffer massiven Schaden und verschwinde wieder",tags:["rogue","ranger"],stags:["rogue_assassin","rogue_thief","ranger_gloom"]},
{l:"C",text:"Ich kontrolliere das Schlachtfeld - Gegner koennen nicht machen was sie wollen",tags:["wizard","sorcerer","druid"],stags:["wizard_divination","wizard_evocation","sorcerer_draconic","druid_land"]},
{l:"D",text:"Ich halte meine Verbuendeten am Leben und verstaerke sie",tags:["cleric","bard","druid","paladin"],stags:["cleric_life","cleric_grave","bard_lore","druid_dreams","paladin_glory"]},
{l:"E",text:"Ich schiesse aus der Distanz und deal konstanten zuverlaessigen Schaden",tags:["ranger","warlock","fighter"],stags:["ranger_hunter","warlock_fiend","warlock_goo","fighter_champion"]}
]},
{id:2,cat:"Kampfrolle",text:"Wie gehst du mit mehreren Gegnern gleichzeitig um?",opts:[
{l:"A",text:"Ich stelle mich dazwischen und nehme den Schaden fuer die Gruppe",tags:["fighter","barbarian","paladin"],stags:["fighter_cavalier","barbarian_totem","paladin_devotion","paladin_ancients"]},
{l:"B",text:"Ich zaubere etwas das alle gleichzeitig trifft oder einschraenkt",tags:["wizard","sorcerer","druid","cleric"],stags:["wizard_evocation","sorcerer_draconic","sorcerer_storm","druid_land","cleric_light"]},
{l:"C",text:"Ich fokussiere den gefaehrlichsten zuerst und eliminiere ihn schnell",tags:["rogue","ranger","warlock"],stags:["rogue_assassin","ranger_gloom","ranger_monster","warlock_fiend","warlock_hexblade"]},
{l:"D",text:"Ich buff meine Verbuendeten damit sie effizienter kaempfen",tags:["bard","cleric","paladin"],stags:["bard_lore","bard_glamour","cleric_war","paladin_glory"]},
{l:"E",text:"Ich nutze Umgebung und Reichweite um alle auf Abstand zu halten",tags:["ranger","fighter","monk"],stags:["ranger_hunter","fighter_battlemaster","monk_openhand","monk_kensei"]}
]},
{id:3,cat:"Kampfrolle",text:"Was soll dein Charakter nach einem langen Kampftag noch leisten?",opts:[
{l:"A",text:"Genauso kaempfen wie am Anfang - ich brauche keine Ressourcen",tags:["fighter","barbarian","monk"],stags:["fighter_champion","fighter_battlemaster","barbarian_berserker","monk_openhand"]},
{l:"B",text:"Noch ein paar impactvolle Tricks in der Hinterhand haben",tags:["paladin","ranger","warlock"],stags:["paladin_vengeance","ranger_gloom","warlock_fiend","warlock_goo"]},
{l:"C",text:"Ich bin nach 2-3 Kaempfen leer - dafuer bin ich in diesen Kaempfen unschlagbar",tags:["wizard","sorcerer","druid"],stags:["wizard_divination","sorcerer_draconic","sorcerer_shadow","druid_moon"]},
{l:"D",text:"Ich regeneriere bei kurzen Pausen schnell und bin sofort wieder bereit",tags:["warlock","monk","fighter"],stags:["warlock_fiend","warlock_goo","warlock_hexblade","warlock_celestial","monk_shadow","fighter_eldritchknight"]}
]},
{id:4,cat:"Spielstil",text:"Wie willst du Probleme ausserhalb des Kampfes loesen?",opts:[
{l:"A",text:"Mit Gewalt oder Einschuechterung - direkt und ohne Umweg",tags:["barbarian","fighter","paladin"],stags:["barbarian_zealot","barbarian_totem","fighter_champion","paladin_vengeance"]},
{l:"B",text:"Mit Cleverness, Fallen und vorbereitetem Plan",tags:["rogue","wizard","ranger","artificer"],stags:["rogue_arcane","rogue_inquisitive","wizard_divination","ranger_hunter","artificer_battlesmith"]},
{l:"C",text:"Mit Charme, Ueberredung und sozialer Manipulation",tags:["bard","warlock","sorcerer"],stags:["bard_lore","bard_whispers","warlock_archfey","warlock_goo","sorcerer_divine"]},
{l:"D",text:"Mit Magie und uebernatuerlichen Faehigkeiten",tags:["wizard","sorcerer","warlock","cleric"],stags:["wizard_evocation","wizard_conjuration","sorcerer_wild","warlock_fiend","cleric_knowledge"]},
{l:"E",text:"Mit Naturverbundenheit, Tieren oder uraltem Wissen",tags:["druid","ranger"],stags:["druid_land","druid_shepherd","ranger_beast","ranger_horizon"]}
]},
{id:5,cat:"Spielstil",text:"Wie wichtig ist dir Mobilitaet im Kampf?",opts:[
{l:"A",text:"Sehr wichtig - ich will mich frei bewegen, ausweichen, ueberall sein",tags:["monk","rogue","ranger"],stags:["monk_shadow","monk_drunken","rogue_thief","rogue_scout","ranger_gloom"]},
{l:"B",text:"Mittel - ich bewege mich wenn noetig aber stehe lieber solide fest",tags:["fighter","paladin","cleric"],stags:["fighter_battlemaster","fighter_cavalier","paladin_devotion","cleric_war"]},
{l:"C",text:"Unwichtig - ich stehe hinten und zaubere von dort",tags:["wizard","sorcerer","warlock"],stags:["wizard_evocation","sorcerer_draconic","warlock_goo","warlock_fiend"]},
{l:"D",text:"Ich will der Fels sein den niemand umwirft",tags:["barbarian","fighter"],stags:["barbarian_totem","barbarian_ancestral","fighter_cavalier","fighter_champion"]}
]},
{id:6,cat:"Persoenlichkeit",text:"Woher kommt die Kraft deines Charakters?",opts:[
{l:"A",text:"Jahrelange Ausbildung und Disziplin - ich habe alles erarbeitet",tags:["fighter","monk","ranger","rogue"],stags:["fighter_battlemaster","fighter_samurai","monk_openhand","monk_kensei","ranger_hunter","rogue_thief"]},
{l:"B",text:"Goettlicher Auftrag oder tiefer Glaube - ich bin berufen",tags:["cleric","paladin"],stags:["cleric_life","cleric_light","cleric_war","paladin_devotion","paladin_glory"]},
{l:"C",text:"Ein dunkler Pakt mit einer kosmischen oder teuflischen Macht",tags:["warlock"],stags:["warlock_fiend","warlock_goo","warlock_archfey","warlock_hexblade","warlock_celestial"]},
{l:"D",text:"Angeborenes Talent oder magisches Blut",tags:["sorcerer","bard"],stags:["sorcerer_draconic","sorcerer_wild","sorcerer_divine","bard_lore","bard_swords"]},
{l:"E",text:"Wissen, Forschung und Studium - Magie ist eine Wissenschaft",tags:["wizard","artificer"],stags:["wizard_divination","wizard_evocation","wizard_conjuration","wizard_abjuration","artificer_artillerist","artificer_battlesmith"]},
{l:"F",text:"Die Natur selbst hat mir ihre Kraft verliehen",tags:["druid","ranger"],stags:["druid_land","druid_moon","druid_shepherd","ranger_beast","ranger_horizon"]}
]},
{id:7,cat:"Persoenlichkeit",text:"Was motiviert deinen Charakter am staerksten?",opts:[
{l:"A",text:"Ehre, Pflicht und einen Eid einhalten",tags:["paladin","cleric","fighter"],stags:["paladin_devotion","paladin_ancients","cleric_life","cleric_war","fighter_samurai"]},
{l:"B",text:"Persoenliche Macht - staerker werden um jeden Preis",tags:["warlock","barbarian","sorcerer"],stags:["warlock_fiend","warlock_goo","warlock_hexblade","barbarian_berserker","sorcerer_shadow"]},
{l:"C",text:"Andere schuetzen - die Gruppe geht immer vor mir",tags:["cleric","druid","paladin","bard"],stags:["cleric_life","cleric_grave","druid_dreams","paladin_devotion","paladin_glory","bard_lore","bard_glamour"]},
{l:"D",text:"Wahrheit und Wissen - Geheimnisse aufdecken",tags:["wizard","ranger","druid"],stags:["wizard_divination","wizard_conjuration","ranger_horizon","druid_land","warlock_goo"]},
{l:"E",text:"Freiheit, Abenteuer und persoenliche Bereicherung",tags:["rogue","bard","ranger"],stags:["rogue_thief","rogue_swashbuckler","bard_lore","bard_swords","ranger_hunter"]},
{l:"F",text:"Balance und natuerliche Ordnung bewahren",tags:["druid","monk","paladin"],stags:["druid_land","druid_shepherd","monk_openhand","paladin_ancients","ranger_monster"]}
]},
{id:8,cat:"Persoenlichkeit",text:"Wie verhaelt sich dein Charakter wenn die Gruppe in Lebensgefahr ist?",opts:[
{l:"A",text:"Ich stelle mich vor die anderen - mein Leben zuerst",tags:["paladin","fighter","barbarian"],stags:["paladin_devotion","paladin_ancients","fighter_cavalier","barbarian_totem","barbarian_ancestral"]},
{l:"B",text:"Ich eliminiere die Bedrohung so schnell wie moeglich",tags:["rogue","ranger","warlock","sorcerer"],stags:["rogue_assassin","ranger_gloom","warlock_fiend","sorcerer_draconic","sorcerer_shadow"]},
{l:"C",text:"Ich heile und staerke die anderen damit wir gemeinsam ueberleben",tags:["cleric","bard","druid"],stags:["cleric_life","cleric_grave","bard_lore","bard_glamour","druid_dreams","warlock_celestial"]},
{l:"D",text:"Ich analysiere die Situation und finde den kluegstem Ausweg",tags:["wizard","rogue","artificer"],stags:["wizard_divination","rogue_inquisitive","rogue_arcane","artificer_battlesmith","artificer_armorer"]}
]},
{id:9,cat:"Atmosphaere",text:"Welche dieser Beschreibungen klingt am coolsten?",opts:[
{l:"A",text:"Ein gepanzerter Krieger der einen Drachen niederringt waehrend Verbuendete hinter ihm sicher sind",tags:["fighter","paladin","barbarian"],stags:["fighter_champion","fighter_cavalier","paladin_devotion","barbarian_totem"]},
{l:"B",text:"Ein Assassine der lautlos aus dem Dunkel tritt, einen toedlichen Schlag setzt und verschwindet",tags:["rogue","monk"],stags:["rogue_assassin","monk_shadow"]},
{l:"C",text:"Ein Magier der mit einem einzigen Wort eine ganze Armee einfriert",tags:["wizard","sorcerer"],stags:["wizard_evocation","wizard_divination","sorcerer_draconic","sorcerer_storm"]},
{l:"D",text:"Ein Waldlaeufer der seinen Feind durch finstere Waelder hetzt ohne je gesehen zu werden",tags:["ranger"],stags:["ranger_gloom","ranger_hunter","ranger_monster"]},
{l:"E",text:"Ein Kleriker der einen Gefallenen zurueckbringt und das Boese mit goettlichem Licht verbrennt",tags:["cleric","paladin"],stags:["cleric_life","cleric_light","paladin_devotion","paladin_vengeance"]},
{l:"F",text:"Ein Hexenmeister der kosmische Kraefte kanalisiert die kein Sterblicher verstehen sollte",tags:["warlock"],stags:["warlock_goo","warlock_fiend","warlock_archfey","warlock_hexblade"]},
{l:"G",text:"Ein Barde der mit Worten Armeen bewegt und Feinde mit blossser Musik bezwingt",tags:["bard"],stags:["bard_lore","bard_glamour","bard_whispers"]}
]},
{id:10,cat:"Atmosphaere",text:"Welche Atmosphaere magst du beim Roleplaying?",opts:[
{l:"A",text:"Heroisch - epische Momente, klare Helden, grosse Gesten",tags:["paladin","fighter","cleric"],stags:["paladin_devotion","paladin_glory","fighter_samurai","cleric_light","cleric_war"]},
{l:"B",text:"Duester und moralisch komplex - keine einfachen Antworten",tags:["warlock","rogue","ranger"],stags:["warlock_goo","warlock_fiend","rogue_assassin","rogue_scout","ranger_gloom","sorcerer_shadow"]},
{l:"C",text:"Geheimnisvoll - Raetsel, verborgenes Wissen, uralte kosmische Maeche",tags:["wizard","druid","warlock"],stags:["wizard_divination","druid_land","warlock_goo","warlock_archfey","sorcerer_shadow"]},
{l:"D",text:"Sozial und charaktergetrieben - Beziehungen, Humor, Emotionen",tags:["bard","sorcerer","rogue"],stags:["bard_lore","bard_glamour","sorcerer_divine","rogue_swashbuckler","warlock_archfey"]},
{l:"E",text:"Spirituell - Glaube, innere Staerke, hoeherer Zweck",tags:["cleric","paladin","monk","druid"],stags:["cleric_life","paladin_devotion","paladin_ancients","monk_openhand","druid_land"]}
]},
{id:11,cat:"Magie",text:"Wie stehst du zu Magie?",opts:[
{l:"A",text:"Ich will pure maechtige Magie - riesige Zauberliste, volle Kontrolle",tags:["wizard","sorcerer"],stags:["wizard_evocation","wizard_divination","sorcerer_draconic","sorcerer_storm"]},
{l:"B",text:"Magie als Ergaenzung - ein paar Tricks neben koerperlichen Faehigkeiten",tags:["ranger","paladin","bard","artificer"],stags:["ranger_gloom","paladin_vengeance","bard_valor","artificer_artillerist","fighter_eldritchknight"]},
{l:"C",text:"Gar keine Magie - ich vertraue auf Stahl, Muskeln und Koennen",tags:["fighter","barbarian","rogue","monk"],stags:["fighter_champion","fighter_battlemaster","barbarian_berserker","rogue_thief","rogue_scout","monk_kensei"]},
{l:"D",text:"Goettliche oder natuerliche Magie - Kraft durch Glauben oder die Natur",tags:["cleric","paladin","druid"],stags:["cleric_life","cleric_light","paladin_devotion","druid_land","druid_moon"]},
{l:"E",text:"Dunkle oder verbotene Magie - Macht die andere fuerchten",tags:["warlock","sorcerer"],stags:["warlock_fiend","warlock_goo","warlock_hexblade","sorcerer_shadow","sorcerer_wild"]}
]},
{id:12,cat:"Magie",text:"Wenn du Magie einsetzt - was soll sie hauptsaechlich bewirken?",opts:[
{l:"A",text:"Massiven Schaden auf viele Gegner gleichzeitig",tags:["wizard","sorcerer","druid"],stags:["wizard_evocation","sorcerer_draconic","sorcerer_storm","druid_land","cleric_light"]},
{l:"B",text:"Gegner kontrollieren, verlangsamen oder ausser Gefecht setzen",tags:["wizard","sorcerer","druid","bard"],stags:["wizard_divination","sorcerer_draconic","druid_land","bard_lore","warlock_archfey"]},
{l:"C",text:"Verbuendete heilen, staerken und schuetzen",tags:["cleric","bard","druid","paladin"],stags:["cleric_life","cleric_grave","bard_lore","bard_glamour","druid_dreams","paladin_glory","warlock_celestial"]},
{l:"D",text:"Utility - Teleportation, Informationen sammeln, Probleme loesen",tags:["wizard","warlock","bard","artificer"],stags:["wizard_conjuration","wizard_divination","warlock_goo","bard_lore","artificer_battlesmith"]},
{l:"E",text:"Einen einzelnen vernichtenden Fluch oder Angriff",tags:["warlock","paladin","cleric"],stags:["warlock_fiend","warlock_hexblade","paladin_vengeance","cleric_light"]}
]},

var CC={fighter:"#378ADD",barbarian:"#D85A30",paladin:"#9B59B6",rogue:"#1D9E75",ranger:"#639922",wizard:"#533AB7",sorcerer:"#BA7517",warlock:"#993556",cleric:"#c8a020",druid:"#2d8a2d",bard:"#D4537E",monk:"#1a8a8a",artificer:"#8a5a1a"};
var RL=[{k:"tank",l:"Tank",i:"",c:"#4a90d9"},{k:"damage",l:"Schaden",i:"",c:"#d85a30"},{k:"control",l:"Kontrolle",i:"",c:"#9b59b6"},{k:"support",l:"Support",i:"",c:"#2d8a2d"},{k:"utility",l:"Utility",i:"",c:"#c8a020"}];

var ans={},cur=0;

function sc(){
  var cls={},sub={};
  Object.keys(CD).forEach(function(k){cls[k]=0;});
  Object.values(ans).forEach(function(a){
    a.tags.forEach(function(t){if(cls[t]!==undefined)cls[t]++;});
    a.stags.forEach(function(s){sub[s]=(sub[s]||0)+1;});
  });
  return {cls:cls,sub:sub};
}

function pips(n){
  var h="";
  for(var i=0;i<5;i++)h+='<div class="cxp'+(i<n?" on":"")+'"></div>';
  return h;
}

function render(){
  document.getElementById("app").innerHTML=cur<Q.length?bQ():bR();
  bind();
}

function bQ(){
  var q=Q[cur];
  var pct=Math.round((cur/Q.length)*100);
  var prev=ans[q.id];
  var os="";
  q.opts.forEach(function(o){
    var sel=prev&&JSON.stringify(prev.tags)===JSON.stringify(o.tags)?" sel":"";
    os+='<button class="opt'+sel+'" data-tags=\''+JSON.stringify(o.tags)+'\' data-stags=\''+JSON.stringify(o.stags)+'\' data-qid="'+q.id+'"><span class="ol">'+o.l+'</span><span>'+o.text+'</span></button>';
  });
  return '<div class="hdr"><span class="bdg">D&amp;D 5e</span><h1>Charakterfindung</h1><p>Beantworte 20 Fragen und finde deine perfekte Klasse &amp; Unterklasse</p></div>'+
    '<div class="pw"><div class="pf" style="width:'+pct+'%"></div></div>'+
    '<div class="card"><div class="qm">'+q.cat+' - Frage '+q.id+' von '+Q.length+'</div><div class="qt">'+q.text+'</div><div class="opts">'+os+'</div></div>'+
    '<div class="nav"><button class="btn bg" id="bb"'+(cur===0?" disabled":"")+'>&#8592; Zurueck</button><span class="qc">'+(cur+1)+' / '+Q.length+'</span><button class="btn bs" id="bn"'+(!ans[q.id]?" disabled":"")+'>'+(cur===Q.length-1?"Ergebnis &#8594;":"Weiter &#8594;")+'</button></div>';
}

function bR(){
  var s=sc();
  var rc=Object.entries(s.cls).sort(function(a,b){return b[1]-a[1];});
  var tk=rc[0][0];
  var mx=rc[0][1];
  var d=CD[tk];
  var alts=rc.slice(1,3);
  var ms=d.subs.map(function(sb){return Object.assign({},sb,{score:s.sub[sb.key]||0});});
  var mxs=Math.max.apply(null,ms.map(function(x){return x.score;}));
  if(mxs===0)mxs=1;
  ms.sort(function(a,b){return b.score-a.score;});

  var rg=RL.map(function(r){
    return '<div class="rb"><div class="ric">'+r.i+'</div><div class="rnm">'+r.l+'</div><div class="rbw"><div class="rbf" style="width:'+d.rb[r.k]+'%;background:'+r.c+'"></div></div><div class="rvl">'+d.rb[r.k]+'%</div></div>';
  }).join("");

  var pshtml=d.ps.map(function(p){return '<div class="psi"><div class="psd"></div><span>'+p+'</span></div>';}).join("");

  var sbhtml=ms.map(function(sb,i){
    var bw=Math.round((sb.score/mxs)*100);
    return '<div class="sbi'+(i===0?" top":"")+'"><div class="sbh"><span class="sbn">'+sb.n+'</span><span class="sbsrc">'+sb.src+'</span>'+(i===0?'<span class="sbbdg">Empfohlen</span>':'')+' <span class="sbrl">'+sb.r+'</span></div><div class="sbbw"><div class="sbbar" style="width:'+bw+'%"></div></div><div class="sbd">'+sb.d+'</div></div>';
  }).join("");

  var profhtml=rc.slice(0,8).map(function(x){
    var pct=mx>0?Math.round((x[1]/mx)*100):0;
    return '<div class="scr"><span class="scl">'+CD[x[0]].n+'</span><div class="sct"><div class="scb" style="width:'+pct+'%;background:'+CC[x[0]]+'"></div></div><span class="scv">'+x[1]+'</span></div>';
  }).join("");

  var althtml=alts.map(function(x){
    return '<div class="alti"><strong>'+CD[x[0]].n+'</strong> - '+CD[x[0]].subs[0].n+' - '+CD[x[0]].role+'</div>';
  }).join("");

  return '<div class="hdr"><span class="bdg">Dein Ergebnis</span></div>'+
    '<div class="card">'+
    '<div class="rh"><div class="ri">'+d.ic+'</div><div class="rn">'+d.n+'</div><div class="rs">'+d.sub+' - '+d.role+'</div></div>'+
    '<hr class="div">'+
    '<div style="margin-bottom:16px"><div class="sl">Kampfrolle</div><div class="rg">'+rg+'</div></div>'+
    '<div style="margin-bottom:16px"><div class="sl">Komplexitaet</div><div style="display:flex;align-items:center;gap:10px"><div class="cxr">'+pips(d.cx)+'</div><span style="font-size:13px;color:var(--txt2)">'+["","Sehr einfach","Einfach","Mittel","Komplex","Sehr komplex"][d.cx]+'</span></div></div>'+
    '<hr class="div">'+
    '<div style="margin-bottom:16px"><div class="sl">Beschreibung</div><div class="rd">'+d.desc+'</div></div>'+
    '<div style="margin-bottom:16px"><div class="sl">Spielweise</div><div class="psb">'+pshtml+'</div></div>'+
    '<div class="swg" style="margin-bottom:16px"><div class="swb str"><div class="swl">Staerken</div><p>'+d.str+'</p></div><div class="swb wk"><div class="swl">Schwaechen</div><p>'+d.wk+'</p></div></div>'+
    '<hr class="div">'+
    '<div style="margin-bottom:16px"><div class="sl">Unterklassen - Ranking basierend auf deinen Antworten</div>'+sbhtml+'</div>'+
    '<div style="margin-bottom:16px"><div class="sl">Empfohlene Rasse</div><div class="ib"><div class="it">'+d.rr+'</div><div class="ir">'+d.rrr+'</div></div><div class="tgr">'+d.races.map(function(r){return '<span class="tg">'+r+'</span>';}).join("")+'</div></div>'+
    '<hr class="div">'+
    '<div style="margin-bottom:16px"><div class="sl">Dein Klassen-Profil</div>'+profhtml+'</div>'+
    (alts.length?'<div class="altb"><div class="sl" style="margin-bottom:8px">Alternativ passend</div>'+althtml+'</div>':'')+
    '</div>'+
    '<button class="rstb" id="rst">&#8635; Neu starten</button>'+
    '<div class="fn">D&amp;D 5e - PHB + Xanathar\'s Guide</div>';
}

function bind(){
  document.querySelectorAll(".opt").forEach(function(btn){
    btn.addEventListener("click",function(){
      var qid=parseInt(btn.dataset.qid);
      ans[qid]={tags:JSON.parse(btn.dataset.tags),stags:JSON.parse(btn.dataset.stags)};
      document.querySelectorAll(".opt").forEach(function(b){b.classList.remove("sel");});
      btn.classList.add("sel");
      var n=document.getElementById("bn");
      if(n)n.disabled=false;
    });
  });
  var bb=document.getElementById("bb");
  if(bb)bb.addEventListener("click",function(){if(cur>0){cur--;render();}});
  var bn=document.getElementById("bn");
  if(bn)bn.addEventListener("click",function(){
    if(cur<Q.length-1){cur++;render();}
    else{cur=Q.length;render();}
  });
  var rst=document.getElementById("rst");
  if(rst)rst.addEventListener("click",function(){ans={};cur=0;render();});
}

render();
</script>
</body>
</html>
